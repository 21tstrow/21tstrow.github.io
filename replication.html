<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <meta name="description" content="Replication datasets and code for research by Tucker Strow.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav>
    <div class="nav-inner">
      <a href="index.html" class="nav-name">Tucker Strow</a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="replication.html" class="active">Replication</a>
        <a href="cv.html">CV</a>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode" title="Toggle theme">&#9789;</button>
      </div>
    </div>
  </nav>

  <div class="container">
    <main>

      <h1>Replication</h1>
      <p>This page hosts datasets and replication code for my research papers. Each entry includes the data, code, and instructions needed to reproduce the results.</p>

      <section>
        <h2>Datasets &amp; Code</h2>
        <p><em>Coming Soon</em></p>
      </section>

    </main>
  </div>

  <footer>
    <div class="footer-inner">
      <span>&copy; <span id="year"></span> Tucker Strow</span>
    </div>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    (function() {
      var toggle = document.getElementById('themeToggle');
      var root = document.documentElement;
      var stored = localStorage.getItem('theme');

      if (stored === 'dark') {
        root.setAttribute('data-theme', 'dark');
        toggle.innerHTML = '&#9788;';
      }

      toggle.addEventListener('click', function() {
        if (root.getAttribute('data-theme') === 'dark') {
          root.removeAttribute('data-theme');
          localStorage.setItem('theme', 'light');
          toggle.innerHTML = '&#9789;';
        } else {
          root.setAttribute('data-theme', 'dark');
          localStorage.setItem('theme', 'dark');
          toggle.innerHTML = '&#9788;';
        }
      });
    })();
  </script>

</body>
</html>
